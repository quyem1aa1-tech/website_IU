<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - HCMIU</title>
    <link rel="stylesheet" href="../Login/Login.css" />
    <link rel="stylesheet" href="ChangePassword.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="navbar-header">
            <a class="logo" href="https://hcmiu.edu.vn">
                <img src="https://hcmiu.edu.vn/wp-content/uploads/2017/02/logoweb-02.png" alt="Logo IU" class="logo-img" />
            </a>
        </div>
        <nav class="top-links">
            <a href="../HOME/home.html">HOME</a>
            <a href="../course/course.html">COURSE</a>
            <a href="../account/account.html">ACCOUNT</a>
        </nav>
    </header>

    <main>
        <div class="login-box">
            <h2 class="title-blue"><i class="fas fa-key"></i> RESET PASSWORD</h2>
            <p class="instruction">Vui lòng điền thông tin bên dưới để cập nhật mật khẩu mới.</p>
            
            <form id="changePasswordForm">
                <div class="input-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email IU:</label>
                    <input type="email" id="email" name="email" required placeholder="example@student.hcmiu.edu.vn" />
                </div>

                <div class="input-group">
                    <label for="oldPassword"><i class="fas fa-lock-open"></i> Current Password:</label>
                    <input type="password" id="oldPassword" name="oldPassword" required placeholder="Mật khẩu hiện tại" />
                </div>

                <div class="input-group">
                    <label for="newPassword"><i class="fas fa-lock"></i> New Password:</label>
                    <input type="password" id="newPassword" name="newPassword" required placeholder="Mật khẩu mới (ít nhất 8 ký tự)" />
                </div>

                <div class="input-group">
                    <label for="confirmPassword"><i class="fas fa-check-double"></i> Confirm Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Nhập lại mật khẩu mới" />
                </div>

                <button type="submit" class="btn-enter">Update Password</button>
                
                <div class="forget-password back-link">
                    <a href="../account/account.html">← Trở về trang Tài khoản</a>
                </div>
            </form>
            
            <div id="responseMessage" class="message-box"></div>
        </div>
    </main>

    <script src="changepassword.js"></script>
</body>
</html>
