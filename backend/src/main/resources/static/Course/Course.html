<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COURSE - HCMIU</title>
    <link rel="stylesheet" href="../Home/Home.css">
    <link rel="stylesheet" href="../Course/Course.css">
</head>
<body>
<header>
    <div class="navbar-header">
        <a class="logo" href="../Home/Home.html">
            <img src="https://hcmiu.edu.vn/wp-content/uploads/2017/02/logoweb-02.png" alt="Logo IU" />
        </a>
    </div>
    <nav class="top-links">
        <a href="../Home/Home.html">HOME</a>
        <a href="../Course/Course.html" class="active">COURSE</a>
        <a href="../Account/Account.html">ACCOUNT</a>
        <a href="javascript:void(0)" onclick="handleLogout()">LOG OUT</a>
    </nav>
</header>

<main class="course-container">
    <div class="registration-layout">
        <section class="left-panel">
            <h2 class="section-title">Course Registration</h2>
            <div id="danh_sach_mon_hoc" class="course-grid"></div>
            <button id="dangki" class="btn-enter">Confirm</button>

            <h2 class="section-title" style="margin-top: 40px;">Registered Courses</h2>

            <div class="enrolled-box">
                <table id="table-registered" style="width: 100%; border-collapse: collapse;">
                    <thead>
                    <tr style="background-color: #2c387e; color: white; text-align: left;">
                        <th style="padding: 10px; width: 50px; text-align: center;">Select</th>
                        <th style="padding: 10px;">Course Name</th>
                    </tr>
                    </thead>
                    <tbody id="danhsachdadangki">
                    </tbody>
                </table>

                <div style="text-align: right; margin-top: 20px;">
                    <button id="change" class="btn-change">Change</button>
                </div>
            </div>
        </section>

        <aside class="right-panel">
            <div class="search-box">
                <h3>Search Course</h3>
                <input type="text" id="timkiemmonhoc" placeholder="Tìm theo tên môn">
            </div>
        </aside>
    </div>
</main>
<script src="../Auth.js"></script>
<script src="Course.js"></script>
</body>
</html>
