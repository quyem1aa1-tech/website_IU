<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="stylesheet" href="Login.css" />
</head>
<body>
<header>
    <div class="navbar-header">
        <a
                class="logo"
                href="https://hcmiu.edu.vn"
                title="Trường Đại học Quốc Tế - International University"
        >
            <img
                    src="https://hcmiu.edu.vn/wp-content/uploads/2017/02/logoweb-02.png"
                    alt="Trường Đại học Quốc Tế - International University"
            />
        </a>
    </div>

    <nav class="top-links">
        <a href="#">HOME</a>
        <a href="#">COURSE</a>
        <a href="#">ACCOUNT</a>
    </nav>
</header>
<!-- IMPORTANT PART -->
<main>

    <div class="login-box">
        <form id="loginForm" method="POST">
            <div class="input-group">
                <label for="username">Name:</label>
                <input type="text" id="username" name="username" placeholder="Your name" />
            </div>

            <div class="input-group">
                <label for="password">Pass:</label>
                <input type="password" id="password" name="password" placeholder="Your password" />
            </div>

            <div class="forget-password">
                <a href="../Forgotpass/Forgot.html">Forgot password</a>
            </div>

            <button type="submit" class="btn-enter">Enter</button>
        </form>
        <p id="message"> </p>
    </div>

</main>
<script src="Login.js"></script>
</body>
</html>
