<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - My App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 12px; }
    </style>
</head>
<body>

<h1 id="testStatus"></h1>

<div class="card shadow login-card">
    <h2 class="text-center mb-4">Login</h2>

    <div id="errorMessage" class="alert alert-danger d-none">Invalid username or password.</div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop the page from refreshing

        const loginData = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(loginData)
        })
        .then(response => {
            /* if (response.ok) {
                window.location.href = "/dashboard.html"; // Success!
            } else {
                document.getElementById('errorMessage').classList.remove('d-none');
            } */

            return response.text();
        })
        .then(data => {
            document.getElementById("testStatus").innerText = data;
        })
        .catch(err => console.error("Login Error:", err));
    });
</script>

</body>
</html>
